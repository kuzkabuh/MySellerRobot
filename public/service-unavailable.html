<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="5">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MP Control запускается</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #111827;
    }
    .card {
      max-width: 480px;
      margin: 24px;
      padding: 32px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 45px rgba(17, 24, 39, 0.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 26px;
    }
    p {
      color: #4b5563;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      margin-top: 16px;
      padding: 11px 18px;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>MP Control запускается</h1>
    <p>Сервис обновляется или перезапускается. Страница автоматически обновится через несколько секунд.</p>
    <p>Если вход был по ссылке из Telegram и она устарела, получите новую ссылку в боте.</p>
    <a href="https://t.me/mpcontrolrobot">Открыть бота</a>
  </main>
</body>
</html>
