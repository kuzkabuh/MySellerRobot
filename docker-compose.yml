# version: 1.11.0
# description: Local Docker Compose stack. PostgreSQL and Redis use internal network only (expose).
#              For local tools (pgAdmin, RedisInsight), create docker-compose.override.yml
#              with port mappings — see docker-compose.override.yml.example.
# updated: 2026-06-10
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seller_profit_bot}
      POSTGRES_USER: ${POSTGRES_USER:-seller_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seller_bot}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seller_bot} -d ${POSTGRES_DB:-seller_profit_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: runtime
    command: uvicorn app.api.main:create_app --factory --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./runtime:/opt/mpcontrol/runtime:ro
      - ./logs:/opt/mpcontrol/logs:ro
      - ./backups:/opt/mpcontrol/backups:ro
      - ./scripts:/opt/mpcontrol/scripts:ro
      - ./VERSION:/opt/mpcontrol/VERSION:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      target: runtime
    command: python -m app.bot.main
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./runtime:/opt/mpcontrol/runtime
      - ./logs:/opt/mpcontrol/logs:ro
      - ./backups:/opt/mpcontrol/backups:ro
      - ./VERSION:/opt/mpcontrol/VERSION:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: runtime
    command: arq app.workers.settings.WorkerSettings
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./runtime:/opt/mpcontrol/runtime:ro
      - ./logs:/opt/mpcontrol/logs:ro
      - ./backups:/opt/mpcontrol/backups:ro
      - ./VERSION:/opt/mpcontrol/VERSION:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
