# version: 1.8.1
# description: Local Docker Compose stack for app, worker, PostgreSQL, and Redis.
# updated: 2026-05-15
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seller_profit_bot}
      POSTGRES_USER: ${POSTGRES_USER:-seller_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seller_bot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seller_bot} -d ${POSTGRES_DB:-seller_profit_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn app.api.main:create_app --factory --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./runtime:/opt/mpcontrol/runtime:ro
      - ./logs:/opt/mpcontrol/logs:ro
      - ./backups:/opt/mpcontrol/backups:ro
      - ./VERSION:/opt/mpcontrol/VERSION:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build: .
    command: python -m app.bot.main
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./runtime:/opt/mpcontrol/runtime
      - ./logs:/opt/mpcontrol/logs:ro
      - ./backups:/opt/mpcontrol/backups:ro
      - ./VERSION:/opt/mpcontrol/VERSION:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: arq app.workers.settings.WorkerSettings
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./runtime:/opt/mpcontrol/runtime:ro
      - ./logs:/opt/mpcontrol/logs:ro
      - ./backups:/opt/mpcontrol/backups:ro
      - ./VERSION:/opt/mpcontrol/VERSION:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
