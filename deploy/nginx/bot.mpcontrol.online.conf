# version: 1.9.1
# description: Nginx config for Telegram bot webhook domain (bot.mpcontrol.online).
# updated: 2026-06-02
#
# Usage:
#   1. Issue the certificate for bot.mpcontrol.online first.
#   2. Copy to /etc/nginx/sites-available/bot.mpcontrol.online.conf
#   3. ln -s /etc/nginx/sites-available/bot.mpcontrol.online.conf /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx

upstream mpcontrol_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name bot.mpcontrol.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for bot webhook
server {
    listen 443 ssl http2;
    server_name bot.mpcontrol.online;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/bot.mpcontrol.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.mpcontrol.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/bot_mpcontrol.access.log;
    error_log /var/log/nginx/bot_mpcontrol.error.log;

    client_max_body_size 20m;

    # Block sensitive files
    location ~* ^/(?:\.git(?:/|$)|\.env$|wp-admin(?:/|$)|wp-login\.php$|xmlrpc\.php$|vendor|phpunit|geoserver|actuator|boaform|cgi-bin) {
        return 404;
    }

    # Telegram webhook endpoint
    location = /webhook/telegram {
        proxy_pass http://mpcontrol_api/webhook/telegram;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Only allow POST method
        limit_except POST {
            deny all;
        }
    }

    # Health check endpoint
    location = /health {
        proxy_pass http://mpcontrol_api/health;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Block all other paths - return 404
    location / {
        return 404;
    }
}
