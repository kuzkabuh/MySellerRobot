# version: 1.9.9
# description: Production Docker Compose stack for MP Control services.
# updated: 2026-05-15

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seller_profit_bot}
      POSTGRES_USER: ${POSTGRES_USER:-seller_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-seller_bot} -d ${POSTGRES_DB:-seller_profit_bot}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    logging: *default-logging
    command: uvicorn app.api.main:create_app --factory --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./runtime:/opt/mpcontrol/runtime:ro
      - ./logs:/opt/mpcontrol/logs:ro
      - ./backups:/opt/mpcontrol/backups:ro
      - ./VERSION:/opt/mpcontrol/VERSION:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\nPY",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  bot:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    logging: *default-logging
    command: python -m app.bot.main
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./runtime:/opt/mpcontrol/runtime
      - ./logs:/opt/mpcontrol/logs:ro
      - ./backups:/opt/mpcontrol/backups:ro
      - ./VERSION:/opt/mpcontrol/VERSION:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    logging: *default-logging
    command: arq app.workers.settings.WorkerSettings
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./runtime:/opt/mpcontrol/runtime
      - ./runtime:/app/runtime
      - ./logs:/opt/mpcontrol/logs:ro
      - ./backups:/opt/mpcontrol/backups:ro
      - ./VERSION:/opt/mpcontrol/VERSION:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
